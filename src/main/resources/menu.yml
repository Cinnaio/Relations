title: "你的关系列表 - 第 <page> 页"
  
mappings:
  border:
    material: GRAY_STAINED_GLASS_PANE
    name: ' '
    sorts: [ 0-8, 9, 17, 18, 26, 27, 35, 36, 44, 46-53 ]
  
  button_next:
    material: ARROW
    name: "<yellow>下一页"
    sorts: [ 53 ]
    
  button_close:
    material: "PAPER{cmd:10003}"
    name: "<red>关闭菜单"
    sorts: [ 49 ]
    
  button_previous:
    material: ARROW
    name: "<yellow>上一页"
    sorts: [ 45 ]

# 关系列表配置
relations:
  # 默认类型标题
  header-item:
    material: BOOK
    name: "<display>"
    lore:
      - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"
      
  # 默认成员头像
  member-item:
    material: PLAYER_HEAD
    name: "<display>"
    lore:
      - "<!i><color:#A0A0A0>对象: <color:#FFD866><partner>"
      - "<!i><color:#A0A0A0>亲密度: <color:#6BFF95><affinity>"
      - "<!i><color:#A0A0A0>日期: <color:#E6E6E6><date>"
      - "<!i><color:#A0A0A0>等级: <color:#E6E6E6><level_display>"

  # 不同类型的特殊配置 (覆盖默认)
  types:
    marriage:
      header-item:
        material: 'STONE'
        name: "<display>"
        lore:
          - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"
    brother:
      header-item:
        material: IRON_SWORD
        name: "<display>"
        lore:
          - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"
    sister:
      header-item:
        material: CAKE
        name: "<display>"
        lore:
          - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"
    best_friend:
      header-item:
        material: DIAMOND
        name: "<display>"
        lore:
          - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"
    mentor:
      header-item:
        material: EXPERIENCE_BOTTLE
        name: "<display>"
        lore:
          - "<!i><color:#A0A0A0>当前: <color:#6EC6FF><current><color:#5A5A5A>/<color:#AEEFFF><max>"