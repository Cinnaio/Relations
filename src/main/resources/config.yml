database:
  # 选项: SQLITE, MYSQL
  type: SQLITE
  host: localhost
  port: 3306
  database: relations
  username: root
  password: ""
  ssl: false
  pool-size: 10

settings:
  default-lang: zh_cn


levels:
  1: 0
  2:
    affinity: 500
    # 可用动作: [op], [player], [console], [message], [broadcast], [title], [potion]
    # 占位符: <player>, <partner>, <level>, <type>
    actions:
      - "[message] <color:#6BFF95>恭喜！你和 <partner> 的关系达到了 Lv.2！</color>"
      - "[title] <color:#FF8FB1>关系升级！</color>;<color:#FFD866>Lv.2 达成</color>;10;70;20"
  3: 1000
  4: 2000
  5: 5000

relations:
  marriage:
    display: "<!i><color:#FF8FB1><bold>伴侣 <color:#FF8FB1>(❤)"
    max: 1
    # 婚姻专属功能
    features:
      home: true
      gift: true
      tp: true
      kiss: true
    # 每日亲密度上限 (默认)
    daily-affinity-limit: 1000
  brother:
    display: "<!i><color:#6EC6FF><bold>兄弟"
    max: 5
    daily-affinity-limit: 1000
  best_friend:
    display: "<!i><color:#FFD479><bold>挚友"
    max: 5
    daily-affinity-limit: 1000
  sister:
    display: "<!i><color:#C39BFF><bold>闺蜜"
    max: 5
    daily-affinity-limit: 1000
  mentor:
    display: "<!i><color:#AEEFFF><bold>导师"
    max: 1
    daily-affinity-limit: 1000

debug: false